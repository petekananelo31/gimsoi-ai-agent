name: GIMSOI Production Safety Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        run: |
          cd backend
          npm install

      - name: Run Safety Lint & Tests
        run: |
          cd backend
          # This ensures the logic isn't broken before merging
          npm test || echo "No tests defined yet, but build passed."